Builds:
  - versionName: '2.1.5'
    versionCode: 229
    commit: v2.1.5
    subdir: BT_Free
    sudo:
      - apt-get update || apt-get update
      - apt-get install -y openjdk-17-jdk-headless gcc make
      - update-alternatives --auto java || true
    gradle:
      - production
    ndk: r26b
    prebuild: sdkmanager "platforms;android-36" "build-tools;36.0.0" || true
    build: export NDK_HOME=$$NDK$$ ANDROID_HOME=$$SDK$$ && cd .. && ./build_ndk_libraries.sh
    scandelete:
      - BTLib/key
      - LuaJIT-2.1

  - versionName: '2.1.3'
    versionCode: 227
    commit: v2.1.3
    subdir: BT_Free
    sudo:
      - apt-get update || apt-get update
      - apt-get install -y openjdk-17-jdk-headless gcc make
      - update-alternatives --auto java || true
    gradle:
      - production
    ndk: r26b
    prebuild: sdkmanager "platforms;android-36" "build-tools;36.0.0" || true
    build: export NDK_HOME=$$NDK$$ ANDROID_HOME=$$SDK$$ && cd .. && ./build_ndk_libraries.sh
    scandelete:
      - BTLib/key
      - LuaJIT-2.1

MaintainerNotes: |
  Native libs are produced by ./build_ndk_libraries.sh into BTLib/libs/ (not
  committed). Release signing is left unset unless BT_LOCAL_SIGN=1; F-Droid
  signs the APK. Package id is com.resurrection.blowtorch2 (production flavor).
  Uses MANAGE_EXTERNAL_STORAGE so default user files can live under /BlowTorch/
  (settings, backups, launcher, session_logs, logs) outside Android/data.
  This is optional for playing; see docs/FDROID_README.md for the full
  permission justification aimed at reviewers and users.

ArchivePolicy: 2 versions
